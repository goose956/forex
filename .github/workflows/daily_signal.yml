name: Daily Forex Signal

on:
  schedule:
    # 07:00 UTC -- year-round compromise
    # Winter (GMT): 07:00 UTC = 07:00 London
    # Summer (BST): 07:00 UTC = 08:00 London
    - cron: '0 7 * * 1-5'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  run-daily-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Debug -- verify checkout and model config
        run: |
          echo "=== Git commit ==="
          git log --oneline -3
          echo "=== Model in forex_agents.py ==="
          grep -E "ANTHROPIC_MODEL|OPENAI_MODEL" tracker/agents/forex_agents.py || true

      - name: Run daily signal analysis
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/run_daily.py

      - name: Update signal outcomes
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/update_outcomes.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-${{ github.run_id }}
          path: tracker/logs/
          retention-days: 30
